<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#F0FDFA"/>
    </linearGradient>
    <linearGradient id="accent2" x1="210" y1="260" x2="980" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="shadow2" x="-50" y="-50" width="1300" height="900" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="48" fill="url(#bg2)"/>

  <!-- Card -->
  <g filter="url(#shadow2)">
    <rect x="140" y="120" width="920" height="560" rx="40" fill="white"/>
  </g>

  <!-- Header strip -->
  <rect x="140" y="120" width="920" height="96" rx="40" fill="#0F172A"/>
  <rect x="190" y="154" width="280" height="28" rx="14" fill="rgba(255,255,255,0.14)"/>

  <!-- Pill + chart -->
  <g>
    <rect x="200" y="268" width="520" height="360" rx="28" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="230" y="300" width="200" height="14" rx="7" fill="#0F172A" opacity="0.75"/>
    <rect x="230" y="324" width="300" height="10" rx="5" fill="#0F172A" opacity="0.18"/>

    <!-- timeline bars -->
    <rect x="230" y="380" width="440" height="18" rx="9" fill="#E2E8F0"/>
    <rect x="230" y="380" width="260" height="18" rx="9" fill="#0D9488" opacity="0.50"/>

    <rect x="230" y="416" width="440" height="18" rx="9" fill="#E2E8F0"/>
    <rect x="230" y="416" width="330" height="18" rx="9" fill="#06B6D4" opacity="0.45"/>

    <rect x="230" y="452" width="440" height="18" rx="9" fill="#E2E8F0"/>
    <rect x="230" y="452" width="180" height="18" rx="9" fill="#0F172A" opacity="0.18"/>

    <rect x="230" y="488" width="440" height="18" rx="9" fill="#E2E8F0"/>
    <rect x="230" y="488" width="400" height="18" rx="9" fill="#0D9488" opacity="0.35"/>

    <rect x="230" y="540" width="220" height="56" rx="18" fill="url(#accent2)" opacity="0.18"/>
    <rect x="254" y="560" width="144" height="14" rx="7" fill="#0D9488" opacity="0.35"/>
  </g>

  <!-- Bottle icon -->
  <g>
    <path d="M880 260c0-20 16-36 36-36h28c20 0 36 16 36 36v32c0 10-4 19-11 26l-9 9v246c0 28-23 51-51 51h-18c-28 0-51-23-51-51V327l-9-9c-7-7-11-16-11-26v-32z" fill="#0F172A" opacity="0.92"/>
    <rect x="850" y="372" width="160" height="172" rx="30" fill="url(#accent2)" opacity="0.25"/>
    <path d="M872 440h116" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.75"/>
    <path d="M930 404v116" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.75"/>
    <circle cx="930" cy="352" r="34" fill="white" opacity="0.10"/>
  </g>

  <!-- Tag -->
  <g>
    <rect x="720" y="604" width="340" height="56" rx="18" fill="#0F172A"/>
    <rect x="742" y="624" width="220" height="12" rx="6" fill="rgba(255,255,255,0.70)"/>
    <rect x="742" y="642" width="150" height="10" rx="5" fill="rgba(255,255,255,0.36)"/>
  </g>
</svg>

