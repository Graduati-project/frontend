<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="0.55" stop-color="#F0FDFA"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="shadow" x="-60" y="-60" width="1720" height="1120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="soft" x="-60" y="-60" width="1720" height="1120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" rx="64" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="360" cy="230" r="230" fill="#06B6D4" fill-opacity="0.14" filter="url(#soft)"/>
  <circle cx="1240" cy="250" r="240" fill="#0EA5E9" fill-opacity="0.12" filter="url(#soft)"/>
  <circle cx="1040" cy="820" r="280" fill="#22D3EE" fill-opacity="0.10" filter="url(#soft)"/>

  <!-- Main card -->
  <g filter="url(#shadow)">
    <rect x="170" y="160" width="1260" height="680" rx="44" fill="url(#card)" stroke="#E2E8F0"/>
  </g>

  <!-- Left: checklist sheet -->
  <rect x="250" y="240" width="760" height="560" rx="38" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="300" y="290" width="340" height="18" rx="9" fill="#0F172A" fill-opacity="0.14"/>
  <rect x="300" y="322" width="260" height="18" rx="9" fill="#0F172A" fill-opacity="0.10"/>

  <!-- Checklist items -->
  <g>
    <rect x="300" y="390" width="660" height="90" rx="28" fill="#F8FAFC" stroke="#E2E8F0"/>
    <circle cx="350" cy="435" r="22" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8"/>
    <path d="M342 435l6 6 12-14" stroke="#0369A1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="395" y="416" width="330" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
    <rect x="395" y="440" width="250" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>

    <rect x="300" y="500" width="660" height="90" rx="28" fill="#F8FAFC" stroke="#E2E8F0"/>
    <circle cx="350" cy="545" r="22" fill="#06B6D4" fill-opacity="0.18" stroke="#22D3EE"/>
    <path d="M350 535v20M340 545h20" stroke="#0E7490" stroke-width="5" stroke-linecap="round"/>
    <rect x="395" y="526" width="360" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
    <rect x="395" y="550" width="280" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>

    <rect x="300" y="610" width="660" height="90" rx="28" fill="#F8FAFC" stroke="#E2E8F0"/>
    <circle cx="350" cy="655" r="22" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8"/>
    <path d="M342 655l6 6 12-14" stroke="#0369A1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="395" y="636" width="320" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
    <rect x="395" y="660" width="260" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>
  </g>

  <!-- Right: medical pillar + badge -->
  <rect x="1060" y="240" width="330" height="560" rx="38" fill="#FFFFFF" stroke="#E2E8F0"/>

  <!-- Cross icon -->
  <rect x="1132" y="320" width="186" height="186" rx="40" fill="#0EA5E9" fill-opacity="0.10" stroke="#7DD3FC"/>
  <rect x="1211" y="355" width="28" height="116" rx="14" fill="#0284C7"/>
  <rect x="1167" y="399" width="116" height="28" rx="14" fill="#0284C7"/>

  <!-- Guidance cards -->
  <rect x="1100" y="540" width="250" height="86" rx="26" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="1130" y="568" width="150" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
  <rect x="1130" y="592" width="190" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>
  <circle cx="1320" cy="585" r="18" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8"/>

  <rect x="1100" y="646" width="250" height="86" rx="26" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="1130" y="674" width="170" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
  <rect x="1130" y="698" width="210" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>
  <circle cx="1320" cy="691" r="18" fill="#06B6D4" fill-opacity="0.18" stroke="#22D3EE"/>
</svg>
