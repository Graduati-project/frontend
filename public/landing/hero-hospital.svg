<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="0.45" stop-color="#F0FDFA"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="white" stop-opacity="0.85"/>
      <stop offset="1" stop-color="white" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="shadow" x="-50" y="-50" width="1700" height="1100" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="soft" x="-60" y="-60" width="1720" height="1120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" rx="64" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="330" cy="210" r="170" fill="#22C55E" fill-opacity="0.10" filter="url(#soft)"/>
  <circle cx="1250" cy="260" r="210" fill="#06B6D4" fill-opacity="0.12" filter="url(#soft)"/>
  <circle cx="1050" cy="820" r="240" fill="#6366F1" fill-opacity="0.10" filter="url(#soft)"/>

  <!-- Card container -->
  <g filter="url(#shadow)">
    <rect x="160" y="140" width="1280" height="720" rx="48" fill="url(#glass)" stroke="#E2E8F0"/>
  </g>

  <!-- Hospital building -->
  <g>
    <rect x="360" y="300" width="560" height="440" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="420" y="360" width="120" height="140" rx="14" fill="#E0F2FE" stroke="#93C5FD"/>
    <rect x="560" y="360" width="120" height="140" rx="14" fill="#E0F2FE" stroke="#93C5FD"/>
    <rect x="700" y="360" width="120" height="140" rx="14" fill="#E0F2FE" stroke="#93C5FD"/>
    <rect x="420" y="520" width="120" height="140" rx="14" fill="#E0F2FE" stroke="#93C5FD"/>
    <rect x="560" y="520" width="120" height="140" rx="14" fill="#E0F2FE" stroke="#93C5FD"/>
    <rect x="700" y="520" width="120" height="140" rx="14" fill="#E0F2FE" stroke="#93C5FD"/>

    <rect x="935" y="360" width="300" height="380" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="1005" y="515" width="160" height="225" rx="18" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="1074" y="570" width="22" height="110" rx="11" fill="#0EA5E9"/>
    <rect x="1030" y="614" width="110" height="22" rx="11" fill="#0EA5E9"/>

    <!-- Entrance -->
    <rect x="545" y="680" width="190" height="60" rx="18" fill="#0EA5E9" fill-opacity="0.12" stroke="#38BDF8" stroke-width="2"/>
    <rect x="585" y="650" width="110" height="120" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
    <rect x="610" y="710" width="60" height="10" rx="5" fill="#94A3B8"/>
  </g>

  <!-- Right side: checklist & icons -->
  <g>
    <rect x="980" y="220" width="360" height="110" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="1030" cy="275" r="20" fill="#14B8A6" fill-opacity="0.16" stroke="#14B8A6"/>
    <path d="M1022 275l6 6 12-14" stroke="#0F766E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1070" y="252" width="230" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
    <rect x="1070" y="276" width="190" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>

    <rect x="980" y="350" width="360" height="110" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="1030" cy="405" r="20" fill="#06B6D4" fill-opacity="0.16" stroke="#06B6D4"/>
    <path d="M1030 395v20M1020 405h20" stroke="#0E7490" stroke-width="5" stroke-linecap="round"/>
    <rect x="1070" y="382" width="250" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
    <rect x="1070" y="406" width="205" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>

    <rect x="980" y="480" width="360" height="110" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="1030" cy="535" r="20" fill="#6366F1" fill-opacity="0.16" stroke="#6366F1"/>
    <path d="M1021 536l7 7 14-16" stroke="#4338CA" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1070" y="512" width="210" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
    <rect x="1070" y="536" width="240" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>
  </g>
</svg>
