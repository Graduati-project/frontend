<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="0.55" stop-color="#F0FDFA"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="shadow" x="-60" y="-60" width="1720" height="1120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="soft" x="-60" y="-60" width="1720" height="1120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" rx="64" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="340" cy="250" r="220" fill="#0EA5E9" fill-opacity="0.14" filter="url(#soft)"/>
  <circle cx="1220" cy="220" r="240" fill="#06B6D4" fill-opacity="0.14" filter="url(#soft)"/>
  <circle cx="1160" cy="820" r="260" fill="#38BDF8" fill-opacity="0.12" filter="url(#soft)"/>

  <!-- Main card -->
  <g filter="url(#shadow)">
    <rect x="170" y="160" width="1260" height="680" rx="44" fill="url(#card)" stroke="#E2E8F0"/>
  </g>

  <!-- Header -->
  <rect x="250" y="230" width="1100" height="78" rx="26" fill="#0F172A" fill-opacity="0.06"/>
  <circle cx="290" cy="269" r="10" fill="#EF4444" fill-opacity="0.75"/>
  <circle cx="320" cy="269" r="10" fill="#F59E0B" fill-opacity="0.75"/>
  <circle cx="350" cy="269" r="10" fill="#22C55E" fill-opacity="0.75"/>
  <rect x="390" y="256" width="260" height="26" rx="13" fill="#0F172A" fill-opacity="0.10"/>

  <!-- Calendar panel -->
  <rect x="260" y="350" width="740" height="430" rx="34" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="300" y="395" width="260" height="16" rx="8" fill="#0F172A" fill-opacity="0.12"/>
  <rect x="300" y="425" width="200" height="16" rx="8" fill="#0F172A" fill-opacity="0.08"/>

  <!-- Calendar grid -->
  <rect x="300" y="480" width="640" height="260" rx="28" fill="#F8FAFC" stroke="#E2E8F0"/>
  <g fill="#0F172A" fill-opacity="0.10">
    <rect x="330" y="510" width="80" height="56" rx="18"/>
    <rect x="430" y="510" width="80" height="56" rx="18"/>
    <rect x="530" y="510" width="80" height="56" rx="18"/>
    <rect x="630" y="510" width="80" height="56" rx="18"/>
    <rect x="730" y="510" width="80" height="56" rx="18"/>
    <rect x="830" y="510" width="80" height="56" rx="18"/>

    <rect x="330" y="585" width="80" height="56" rx="18"/>
    <rect x="430" y="585" width="80" height="56" rx="18"/>
    <rect x="530" y="585" width="80" height="56" rx="18"/>
    <rect x="630" y="585" width="80" height="56" rx="18"/>
    <rect x="730" y="585" width="80" height="56" rx="18"/>
    <rect x="830" y="585" width="80" height="56" rx="18"/>

    <rect x="330" y="660" width="80" height="56" rx="18"/>
    <rect x="430" y="660" width="80" height="56" rx="18"/>
    <rect x="530" y="660" width="80" height="56" rx="18"/>
    <rect x="630" y="660" width="80" height="56" rx="18"/>
    <rect x="730" y="660" width="80" height="56" rx="18"/>
    <rect x="830" y="660" width="80" height="56" rx="18"/>
  </g>

  <!-- Selected day -->
  <rect x="630" y="585" width="80" height="56" rx="18" fill="#0EA5E9" fill-opacity="0.22" stroke="#38BDF8" stroke-width="2"/>
  <circle cx="690" cy="612" r="6" fill="#0284C7"/>

  <!-- Right side: appointment details -->
  <rect x="1040" y="350" width="330" height="430" rx="34" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="1080" y="395" width="220" height="16" rx="8" fill="#0F172A" fill-opacity="0.12"/>
  <rect x="1080" y="425" width="180" height="16" rx="8" fill="#0F172A" fill-opacity="0.08"/>

  <rect x="1080" y="475" width="250" height="90" rx="26" fill="#0EA5E9" fill-opacity="0.10" stroke="#7DD3FC"/>
  <rect x="1108" y="503" width="140" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
  <rect x="1108" y="527" width="110" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>
  <circle cx="1298" cy="520" r="24" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8"/>
  <path d="M1290 520l6 6 12-14" stroke="#0369A1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="1080" y="585" width="250" height="90" rx="26" fill="#06B6D4" fill-opacity="0.10" stroke="#67E8F9"/>
  <rect x="1108" y="613" width="160" height="14" rx="7" fill="#0F172A" fill-opacity="0.12"/>
  <rect x="1108" y="637" width="120" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>
  <circle cx="1298" cy="630" r="24" fill="#06B6D4" fill-opacity="0.18" stroke="#22D3EE"/>
  <path d="M1298 620v20M1288 630h20" stroke="#0E7490" stroke-width="5" stroke-linecap="round"/>

  <!-- Subtle medical icon -->
  <g opacity="0.75">
    <circle cx="1240" cy="292" r="20" fill="#0EA5E9" fill-opacity="0.14" stroke="#38BDF8"/>
    <path d="M1240 282v20M1230 292h20" stroke="#0369A1" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
